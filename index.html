
<link href="https://cdn.jsdelivr.net/npm/@fontsource/special-elite@4.5.4/400.css" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
#ca{min-height:580px;background:#0C0806;border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2.5rem 2rem;font-family:'Special Elite','Courier New',monospace;color:#E8D5A3}
.sc{display:none;width:100%;max-width:480px;text-align:center}
.sc.on{display:block}
.lbl{font-size:10px;letter-spacing:.28em;color:#4A3526;margin-bottom:1.25rem;text-transform:uppercase}
.ttl{font-size:2.8rem;color:#E8D5A3;line-height:1.1;margin-bottom:.75rem;font-weight:400}
.q{font-size:1.1rem;color:#A88B6A;line-height:1.85;margin-bottom:2rem}
.div{width:50px;height:1px;background:#2A1810;margin:1rem auto}
.bp{background:transparent;border:1px solid #7A6045;color:#E8D5A3;padding:.75rem 2rem;font-family:inherit;font-size:.8rem;letter-spacing:.18em;cursor:pointer;border-radius:3px}
.bp:hover{border-color:#C8AA7E}
.bg{background:transparent;border:none;color:#4A3526;font-family:inherit;font-size:.78rem;letter-spacing:.12em;cursor:pointer;padding:.4rem}
.bg:hover{color:#A88B6A}
.mb{width:90px;height:90px;border-radius:50%;border:1px solid #7A6045;background:transparent;display:flex;align-items:center;justify-content:center;cursor:pointer;margin:0 auto 1rem;transition:border-color .2s}
.mb.rec{border-color:#C0402A;animation:pr 1.4s ease-out infinite}
@keyframes pr{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
.mi{width:28px;height:28px;fill:#7A6045;transition:fill .2s}
.mb.rec .mi{fill:#C0402A}
.ta{width:100%;background:#100A06;border:1px solid #2A1810;border-radius:4px;color:#C8AA7E;font-family:inherit;font-size:.95rem;line-height:1.75;padding:.9rem 1rem;resize:none;min-height:130px;margin-bottom:.75rem}
.ta:focus{outline:none;border-color:#4A3526}
.ta::placeholder{color:#2A1810}
.st{font-size:10px;letter-spacing:.1em;color:#4A3526;min-height:18px;margin:.4rem 0}
.nr{display:flex;gap:1rem;justify-content:center;margin-top:1.25rem}
.sp{width:28px;height:28px;border:2px solid #2A1810;border-top-color:#7A6045;border-radius:50%;animation:sp .8s linear infinite;margin:0 auto 1rem}
@keyframes sp{to{transform:rotate(360deg)}}
.idbig{font-size:3.2rem;color:#7A6045;letter-spacing:.2em;margin:1rem 0}
.sc-area{max-height:360px;overflow-y:auto;width:100%;text-align:left}
.sc-area::-webkit-scrollbar{width:3px}
.sc-area::-webkit-scrollbar-thumb{background:#2A1810}
.card{background:#100A06;border:1px solid #1E1108;border-radius:4px;padding:.9rem 1rem;margin-bottom:.6rem}
.cid{font-size:9px;letter-spacing:.22em;color:#3A2416;margin-bottom:.3rem}
.ctit{font-size:.88rem;color:#C8AA7E;margin-bottom:.3rem}
.ctxt{font-size:.8rem;color:#5C4035;line-height:1.6}
.ccat{display:inline-block;font-size:9px;letter-spacing:.14em;color:#3A2416;border:1px solid #1E1108;border-radius:2px;padding:2px 5px;margin-top:.4rem}
.charcount{font-size:10px;color:#3A2416;text-align:right;margin-bottom:.5rem}
.err{color:#C0402A;font-size:10px;letter-spacing:.1em;min-height:16px}
</style>

<div id="ca">

  <div id="s-bienvenida" class="sc on">
    <p class="lbl">Archivo Vivo · Centro</p>
    <h1 class="ttl">El Chismógrafo</h1>
    <div class="div"></div>
    <p class="q" id="q-text">¿Cuál es tu secreto<br>mejor guardado en el Centro?</p>
    <button class="bp" onclick="goTo('grabacion')">ENTRAR A LA CABINA</button>
    <div style="margin-top:.9rem">
      <button class="bg" onclick="goTo('archivo')">VER EL ARCHIVO ›</button>
    </div>
  </div>

  <div id="s-grabacion" class="sc">
    <p class="lbl" id="grab-lbl">Tu turno</p>
    <p class="q" style="font-size:.95rem;margin-bottom:1.25rem">Cuenta tu historia.<br>Nadie sabe quién eres.</p>
    <button id="mb" class="mb" onclick="toggleRec()">
      <svg class="mi" viewBox="0 0 24 24"><path d="M12 2C10.34 2 9 3.34 9 5v6c0 1.66 1.34 3 3 3s3-1.34 3-3V5c0-1.66-1.34-3-3-3zm-1 3c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5zM6 11c0 3.31 2.69 6 6 6s6-2.69 6-6h-2c0 2.21-1.79 4-4 4s-4-1.79-4-4H6zm5 9v2H8v2h8v-2h-3v-2h2v0z"/></svg>
    </button>
    <p class="st" id="mic-st">Presiona para grabar · o escribe abajo</p>
    <textarea id="ti" class="ta" placeholder="Escribe tu memoria aquí..." rows="5" oninput="updateCount()"></textarea>
    <p class="charcount" id="cc">0 caracteres</p>
    <p class="err" id="err-msg"></p>
    <div class="nr">
      <button class="bg" onclick="goTo('bienvenida')">‹ VOLVER</button>
      <button class="bp" onclick="submitStory()">GUARDAR MEMORIA</button>
    </div>
  </div>

  <div id="s-procesando" class="sc">
    <div class="sp"></div>
    <p class="lbl">Procesando</p>
    <p class="q" id="proc-msg" style="font-size:.9rem;margin-bottom:0">Transcribiendo tu relato...</p>
  </div>

  <div id="s-confirmacion" class="sc">
    <p class="lbl">Historia Guardada</p>
    <p class="idbig" id="conf-id">#0001</p>
    <div class="div"></div>
    <p class="q" id="conf-title" style="font-size:.9rem;margin-bottom:2rem;color:#7A6045"></p>
    <div class="nr">
      <button class="bg" onclick="goTo('bienvenida')">OTRA MEMORIA</button>
      <button class="bp" onclick="goTo('archivo')">VER ARCHIVO</button>
    </div>
  </div>

  <div id="s-archivo" class="sc">
    <p class="lbl">Memorias del Centro</p>
    <p id="arc-count" style="font-size:.82rem;color:#4A3526;letter-spacing:.1em;margin-bottom:1.25rem"></p>
    <div class="sc-area" id="stories-list"></div>
    <div class="nr" style="margin-top:1.25rem">
      <button class="bp" onclick="goTo('bienvenida')">DEJAR TU MEMORIA</button>
    </div>
  </div>

</div>

<script>
const stories=[];let recog=null,isRec=false,counter=0;
const QS=["¿Cuál es tu secreto<br>mejor guardado en el Centro?","¿Qué memoria te trae<br>este lugar?","¿Qué nunca le has dicho<br>a nadie sobre el Centro?","¿Qué momento aquí<br>nunca olvidarás?","¿Cuál es el chisme<br>que todos callan?"];
const MSGS=["Transcribiendo tu relato...","La IA está leyendo...","Buscando en el archivo...","Validando la memoria...","Casi listo..."];
let msgTimer=null;

function goTo(sc){
  document.querySelectorAll('.sc').forEach(x=>x.classList.remove('on'));
  document.getElementById('s-'+sc).classList.add('on');
  if(sc==='bienvenida'){
    document.getElementById('q-text').innerHTML=QS[Math.floor(Math.random()*QS.length)];
  }
  if(sc==='grabacion'){
    document.getElementById('ti').value='';
    document.getElementById('cc').textContent='0 caracteres';
    document.getElementById('err-msg').textContent='';
    document.getElementById('mic-st').textContent='Presiona para grabar · o escribe abajo';
    document.getElementById('mb').classList.remove('rec');
    isRec=false;
    initSpeech();
  }
  if(sc==='archivo') renderArc();
}

function updateCount(){
  const v=document.getElementById('ti').value.trim();
  document.getElementById('cc').textContent=v.length+' caracteres';
}

function initSpeech(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){document.getElementById('mic-st').textContent='Escribe tu memoria en el campo de abajo';return;}
  recog=new SR();
  recog.lang='es-CO';recog.continuous=true;recog.interimResults=true;
  recog.onresult=(e)=>{
    let fin='';
    for(let i=e.resultIndex;i<e.results.length;i++){if(e.results[i].isFinal)fin+=e.results[i][0].transcript;}
    if(fin){const ta=document.getElementById('ti');ta.value+=(ta.value?' ':'')+fin;updateCount();}
  };
  recog.onerror=()=>{
    document.getElementById('mic-st').textContent='Error al acceder al micrófono. Escribe tu memoria.';
    document.getElementById('mb').classList.remove('rec');isRec=false;
  };
}

function toggleRec(){
  const btn=document.getElementById('mb'),st=document.getElementById('mic-st');
  if(!recog){st.textContent='Micrófono no disponible. Usa el texto abajo.';return;}
  if(!isRec){
    try{recog.start();}catch(e){st.textContent='Activa el micrófono en tu navegador.';return;}
    btn.classList.add('rec');st.textContent='● Grabando... habla tu memoria';isRec=true;
  }else{
    recog.stop();btn.classList.remove('rec');st.textContent='Grabación guardada. Revisa el texto.';isRec=false;
  }
}

function cycleMsg(){
  let i=0;
  document.getElementById('proc-msg').textContent=MSGS[0];
  msgTimer=setInterval(()=>{i=(i+1)%MSGS.length;document.getElementById('proc-msg').textContent=MSGS[i];},1600);
}

async function submitStory(){
  const text=document.getElementById('ti').value.trim();
  if(text.length<8){document.getElementById('err-msg').textContent='Escribe algo antes de guardar.';return;}
  if(isRec&&recog){recog.stop();isRec=false;}
  document.getElementById('err-msg').textContent='';
  goTo('procesando');cycleMsg();
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:1000,
        system:'Eres el curador de El Chismógrafo, archivo vivo de memorias del Centro de una ciudad latinoamericana. Responde SOLO con JSON válido, sin texto extra, sin ```json. Formato: {"approved":true/false,"title":"título poético máximo 5 palabras","category":"memoria|secreto|confesión|observación","reason":"breve"}. Aprueba casi todo excepto: groserías severas, violencia explícita, datos personales identificables. Las memorias imperfectas y en dialecto local valen. Genera títulos evocadores en español.',
        messages:[{role:'user',content:'Modera este relato:\n\n"'+text+'"'}]
      })
    });
    const d=await res.json();
    clearInterval(msgTimer);
    const raw=d.content?.find(c=>c.type==='text')?.text||'{}';
    let r;
    try{r=JSON.parse(raw.replace(/```json|```/g,'').trim());}
    catch{r={approved:true,title:'Memoria del Centro',category:'memoria'};}
    if(r.approved!==false){
      saveStory(text,r.title||'Memoria del Centro',r.category||'memoria');
    }else{
      document.getElementById('proc-msg').textContent='Esta memoria no pudo guardarse. Intenta de nuevo.';
      setTimeout(()=>goTo('grabacion'),2500);
    }
  }catch(e){
    clearInterval(msgTimer);
    saveStory(text,'Memoria del Centro','memoria');
  }
}

function saveStory(text,title,cat){
  counter++;
  const id=String(counter).padStart(4,'0');
  stories.unshift({id,text,title,cat,date:new Date().toLocaleDateString('es-CO')});
  document.getElementById('conf-id').textContent='#'+id;
  document.getElementById('conf-title').textContent=title;
  goTo('confirmacion');
}

function renderArc(){
  const list=document.getElementById('stories-list');
  const cnt=document.getElementById('arc-count');
  cnt.textContent=stories.length===0?'El archivo espera su primera memoria.':`${stories.length} memoria${stories.length>1?'s':''} guardada${stories.length>1?'s':''}`;
  if(stories.length===0){
    list.innerHTML='<p style="color:#2A1810;font-size:.82rem;text-align:center;padding:2rem 0">Sé el primero en confesar...</p>';
    return;
  }
  list.innerHTML=stories.map(s=>`
    <div class="card">
      <div class="cid">#${s.id} · ${s.date}</div>
      <div class="ctit">${s.title}</div>
      <div class="ctxt">${s.text.length>180?s.text.slice(0,180)+'...':s.text}</div>
      <span class="ccat">${s.cat.toUpperCase()}</span>
    </div>
  `).join('');
}
</script>
